{% extends "layouts/blank.html" %}
{% block content %}
<wrapper class="block max-w-md mx-auto my-16 px-6">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 text-center">
        <div class="w-16 h-16 rounded-full bg-emerald-600/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-white mb-3">Request Sent!</h1>
        <p class="text-gray-400 text-sm mb-8">
            Your join request for <span class="text-white font-semibold">"{{ chat_group.groupchat_name }}"</span>
            has been sent. You'll be added once the admin approves it.
        </p>
        <a href="{% url 'home' %}"
            class="block w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl transition-colors">
            Go Home
        </a>
    </div>
</wrapper>
{% endblock %}
