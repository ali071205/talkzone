<div id="typing_indicator" hx-swap-oob="innerHTML">
{% if is_typing %}
<div class="flex items-center gap-2 px-4 py-2">
    <img src="{{ avatar }}" alt="{{ name }}"
        class="w-7 h-7 rounded-full object-cover ring-1 ring-slate-700 flex-shrink-0">
    <div class="flex items-center gap-1 px-3 py-2 rounded-2xl rounded-bl-sm"
        style="background:#1E293B; border:1px solid #334155;">
        <span class="text-xs text-slate-400 mr-1">{{ name }}</span>
        <span class="typing-dot"></span>
        <span class="typing-dot" style="animation-delay:0.2s"></span>
        <span class="typing-dot" style="animation-delay:0.4s"></span>
    </div>
</div>
{% endif %}
</div>

<style>
.typing-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22D3EE;
    animation: typingBounce 0.8s infinite ease-in-out;
}
@keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
}
</style>
