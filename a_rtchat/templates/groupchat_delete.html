{% extends "layouts/blank.html" %}
{% block content %}
<wrapper class="block max-w-md mx-auto my-16 px-6">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 text-center">

        <div class="w-16 h-16 rounded-full bg-red-600/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </div>

        <h1 class="text-xl font-bold text-white mb-2">Delete Group?</h1>
        <p class="text-gray-400 text-sm mb-8">
            Are you sure you want to delete <span class="text-white font-semibold">"{{ chat_group.groupchat_name }}"</span>?
            This will permanently delete all messages. This action cannot be undone.
        </p>

        <form method="POST" class="flex gap-3">
            {% csrf_token %}
            <a href="{% url 'groupchat-edit' chat_group.group_name %}"
                class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-xl transition-colors text-center">
                Cancel
            </a>
            <button type="submit"
                class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl transition-colors">
                Yes, Delete
            </button>
        </form>
    </div>
</wrapper>
{% endblock %}
